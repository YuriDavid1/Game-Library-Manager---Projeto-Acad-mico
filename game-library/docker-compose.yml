version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: game-library-db
    environment:
      POSTGRES_DB: game_library
      POSTGRES_USER: game_user
      POSTGRES_PASSWORD: game_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: game-library-app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: game_library
      DB_USER: game_user
      DB_PASSWORD: game_password
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data: