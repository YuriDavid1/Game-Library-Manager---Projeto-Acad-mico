spring:
  datasource:
    url: jdbc:h2:mem:gamelibrary
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

# Actuator - mais detalhado em dev
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# Logging - mais verbose
logging:
  level:
    root: INFO
    com.yuri.gamelibrary: DEBUG

server:
  port: 8080