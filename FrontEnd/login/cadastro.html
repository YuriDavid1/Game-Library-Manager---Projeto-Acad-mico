<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'> 
    <title>Cadastre-se</title>
    <link rel="stylesheet" href="cadastro.css">
    <link rel="stylesheet" href="https://use.typekit.net/rev1kpi.css">
</head>
<body>
<header>
   <nav>
        <div class="logo-container">
        <img src="../images/logo.png" alt="logo" width="200" height="100">
        <a class="logo" href="../home/home.html">Game Library</a>
        </div>
        
        <ul class="nav-list">
            <li><a href="../home/home.html">Inicio</a></li>
            <li><a href="/">Biblioteca</a></li>
            <li><a href="cadastro.html">Login</a></li>
        </ul>
    </nav>
    </header>
    <div class="bg">
    <main class="container">
    <form>
        <div class="text-logo">
        <img src="../images/logo.png" alt="logo" width="150" height="80">
        <h1>Game Library</h1>
        </div>
        <br>
        <h2>Cadastre-se!</h2>

        <div class="input-box">
        <input placeholder="Nome de usuário" type="text" required>
        <i class="bx bxs-user"></i>
        </div>

        <div class="input-box">
        <input placeholder="Email" type="email" required>
        <i class="bx bxs-envelope"></i>
        </div>

        <div class="input-box">
        <input placeholder="Senha" type="password" required>
        <i class="bx bxs-lock-alt"></i>
        </div>

        <div class="input-box">
        <input type="date" required>
        <i class="bx bxs-calendar"></i>
        </div>

        <div class="data-info">
        <small>A data deve ser sua data de aniversário</small>
        </div>

        <div class="termos">
        <label>
        <input type="checkbox" required>
        Eu aceito os <a href="/">termos e condições, a política de cookies e a política de privacidade.</a>
        </label>

        <button class= "cadButton" type="submit">
            Cadastrar
        </button>

        <div class="registro">
            <p>Já possui uma conta? <a href="login.html"> Clique aqui!</a></p>
        </div>
    </form>
    </main>
    </div>
</body>
</html>
