<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre-se</title>
    
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'> 
    <link rel="stylesheet" href="cadastro.css">
    
    <link rel="stylesheet" href="https://use.typekit.net/rev1kpi.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../Componentes/componentes.css">
</head>
<body>
    <div id="header-container"></div>
    
    <div class="bg">
        <main class="container">
            <form>
                <div class="text-logo">
                    <img src="../images/logo.png" alt="logo" width="150" height="80">
                    <h1>Game Library</h1>
                </div>
                <br>
                <h2>Cadastre-se!</h2>

                <div class="input-box">
                    <input id="nomeCad" placeholder="Nome de usuário" type="text" required>
                    <i class="bx bxs-user"></i>
                </div>

                <div class="input-box">
                    <input id="emailCad" placeholder="Email" type="email" required>
                    <i class="bx bxs-envelope"></i>
                </div>

                <div class="input-box">
                    <input id="senhaCad" placeholder="Senha" type="password" required>
                    <i class="bx bxs-lock-alt"></i>
                </div>

                <div class="input-box">
                    <input id="dataNasc" type="date" required>
                    <i class="bx bxs-calendar"></i>
                </div>

                <div class="data-info">
                    <small>A data deve ser sua data de aniversário</small>
                </div>

                <div class="termos">
                    <label>
                        <input type="checkbox" required>
                        Eu aceito os <a href="../politicas/termos.html">termos e condições </a>, a <a href="../politicas/cookies.html">política de cookies</a> e a <a href="../politicas/privacidade.html"> política de privacidade.</a>
                    </label>
                </div>
                
                <button id="cadButton" class="cadButton" type="submit">
                    Cadastrar
                </button>

                <div class="registro">
                    <p>Já possui uma conta? <a href="login.html"> Clique aqui!</a></p>
                </div>
            </form>

            <div id="popupCadastro" class="popup-overlay esconder">
                <div class="popup-conteudo">
                    <i class="fa-solid fa-circle-check popup-icone"></i>
                    <h3>Cadastro Concluído!</h3>
                    <p>Sua conta foi criada com sucesso na Game Library.</p>
                    <button id="btnIrParaLogin" class="btn-recuperar">Ir para o Login</button>
                </div>
            </div>

            <div id="popupErro" class="popup-overlay esconder">
                <div class="popup-conteudo">
                    <i class="fa-solid fa-circle-xmark popup-icone erro"></i>
                    <h3>Ops! Algo deu errado.</h3>
                    <p id="mensagemErro">Ocorreu um erro ao realizar o cadastro.</p>
                    <button id="btnFecharErro" class="btn-erro">Tentar Novamente</button>
                </div>
            </div>

        </main>
    </div>

    <div id="footer-container"></div>
    <script src="../Componentes/global.js"></script>
    <script src="../Componentes/componentes.js"></script>
    <script src="../auth.js"></script>
    
    <script src="../js/api-config.js"></script>
    <script src="./cadastro.js"></script>
</body>
</html>
