<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'> 
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://use.typekit.net/rev1kpi.css">
</head>
<body>
<header>
    <nav>
        <div class="logo-container">
        <img src="../images/logo.png" alt="logo" width="200" height="100">
        <a class="logo" href="../home/home.html">Game Library</a>
        </div>
        
        <ul class="nav-list">
            <li><a href="../home/home.html">Inicio</a></li>
            <li><a href="/">Biblioteca</a></li>
            <li><a href="cadastro.html">Login</a></li>
        </ul>
    </nav>
    </header>
    <div class="bg">
    <main class="container">
    <form>
        <div class="text-logo">
        <img src="../images/logo.png" alt="logo" width="150" height="80">
        <h1>Game Library</h1>
        </div>
        <br>
        <h2>Bem vindo de volta!</h2>

        <div class="input-box">
            <input placeholder ="Usuário/Email" type="email">
            <i class="bx bxs-user"></i>
        </div>

        <div class="input-box">
            <input placeholder = "Senha" type="password">
            <i class="bx bxs-lock-alt"></i>
        </div>

        <div class="senha">
            <a href="#">Esqueci minha senha</a>
        </div>

        <button class= "logButton" type="submit">
            Login
        </button>

        <div class="registro">
            <p>Não possui uma conta? <a href="cadastro.html"> Cadastre-se!</a></p>
        </div>
    </form>
    </main>
    </div>
</body>
</html>
