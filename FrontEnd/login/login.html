<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'> 
    <link rel="stylesheet" href="login.css">
    
    <link rel="stylesheet" href="../Componentes/componentes.css">
    <link rel="stylesheet" href="https://use.typekit.net/rev1kpi.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="header-container"></div>
    
    <div class="bg">
        <main class="container">
            <form>
                <div class="text-logo">
                    <img src="../images/logo.png" alt="logo" width="150" height="80">
                    <h1>Game Library</h1>
                </div>
                <br>
                <h2>Bem vindo de volta!</h2>

                <div class="input-box">
                    <input id="emailLogin" placeholder="Usuário/Email" type="email">
                    <i class="bx bxs-user"></i>
                </div>

                <div class="input-box">
                    <input id="senhaLogin" placeholder="Senha" type="password">
                    <i class="bx bxs-lock-alt"></i>
                </div>

                <div class="senha">
                    <a href="./recuperar-senha.html">Esqueci minha senha</a>
                </div>

                <button id="logButton" class="logButton" type="submit">
                    Login
                </button>

                <div class="registro">
                    <p>Não possui uma conta? <a href="cadastro.html"> Cadastre-se!</a></p>
                </div>
            </form>

            <div id="popupLogin" class="popup-overlay esconder">
                <div class="popup-conteudo">
                    <i class="fa-solid fa-circle-check popup-icone"></i>
                    <h3>Login Bem-sucedido!</h3>
                    <p>Redirecionando para a página inicial...</p>
                </div>
            </div>

            <div id="popupErro" class="popup-overlay esconder">
                <div class="popup-conteudo">
                    <i class="fa-solid fa-circle-xmark popup-icone erro"></i>
                    <h3>Ops! Falha no Login.</h3>
                    <p id="mensagemErro">Usuário ou senha incorretos.</p>
                    <button id="btnFecharErro" type="button" class="btn-erro">Tentar Novamente</button>
                </div>
            </div>
            
        </main>
    </div>

    <div id="footer-container"></div>
    <script src="../Componentes/global.js"></script>
    <script src="../Componentes/componentes.js"></script>
    <script src="../auth.js"></script>
    
    <script src="../js/api-config.js"></script>
    <script src="./login.js"></script>
</body>
</html>
