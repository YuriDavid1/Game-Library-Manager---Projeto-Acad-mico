<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Carrinho - Game Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../Componentes/componentes.css">
    <link rel="stylesheet" href="carrinho.css">
    <link rel="stylesheet" href="https://use.typekit.net/rev1kpi.css">
</head>
<body>

    <div id="header-container"></div>

    <main class="carrinho-main">
        <div class="carrinho-container">
            <h2 class="carrinho-titulo">Seu <span class="highlight">Carrinho</span></h2>
            
            <div class="carrinho-conteudo">
                <div class="carrinho-itens" id="lista-itens-carrinho">
                    </div>

                <div class="carrinho-resumo" id="caixa-resumo" style="display: none;">
                    <h3>Resumo do Pedido</h3>
                    <div class="resumo-linha">
                        <span>Produtos:</span>
                        <span id="resumo-qtd">0 itens</span>
                    </div>
                    <div class="resumo-linha total">
                        <span>Total:</span>
                        <span id="resumo-total">R$ 0,00</span>
                    </div>
                    <button class="btn-checkout" id="btn-prosseguir">Prosseguir para o Checkout</button>
                    <a href="../biblioteca/biblioteca.html" class="btn-continuar">Continuar Comprando</a>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>
    <script src="../Componentes/global.js"></script>
    <script src="../Componentes/componentes.js"></script>
    <script src="../auth.js"></script>
    <script src="../js/api-config.js"></script>
    <script src="carrinho.js"></script>
</body>
</html>
