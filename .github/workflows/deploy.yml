name: Deploy - Produção

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend - Railway
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: cd game-library && chmod +x mvnw && ./mvnw -B clean package -DskipTests -f pom.xml

      - name: Message
        run: echo "Build concluído! Deploy precisa ser feito via Railway Dashboard"